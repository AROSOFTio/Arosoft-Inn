services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arosoft}
      POSTGRES_USER: ${POSTGRES_USER:-arosoft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arosoft} -d ${POSTGRES_DB:-arosoft}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://${POSTGRES_USER:-arosoft}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-arosoft}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:?SEED_USER_PASSWORD is required}
      FRONTEND_URL: ${FRONTEND_URL:-https://new.arosoft.io}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://new.arosoft.io}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-AROSOFT Innovations}
    ports:
      - "127.0.0.1:${API_PORT:-5001}:5000"
    volumes:
      - uploads_data:/app/uploads

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-4020}:80"

volumes:
  postgres_data:
  uploads_data:
